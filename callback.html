<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Signing in…</title>
<style>
  body {
    margin: 0;
    background: #0f0f1a;
    color: #f0ede8;
    font-family: sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100vh;
    flex-direction: column;
    gap: 16px;
  }
  .spinner {
    width: 40px; height: 40px;
    border: 3px solid rgba(255,255,255,0.1);
    border-top-color: #e8a045;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  p { color: #7a7a9a; font-size: 14px; }
</style>
</head>
<body>
<div class="spinner"></div>
<p>Signing you in…</p>
<script>
  // This page is the OAuth redirect target.
  // Google redirects here with #access_token=... in the hash.
  // We grab it immediately and pass it to the main app via localStorage,
  // then redirect back — no server round-trip, no hash loss.
  (function() {
    const hash = new URLSearchParams(window.location.hash.slice(1));
    const token = hash.get('access_token');
    const error = hash.get('error');

    if (error) {
      // Auth was denied or failed
      window.location.href = './index.html?auth=error&reason=' + encodeURIComponent(error);
      return;
    }

    if (token) {
      // Save token for the main app to pick up
      localStorage.setItem('vocab_token', token);
      sessionStorage.setItem('vocab_token', token);
      // Redirect back to main app with a flag so it knows to proceed
      window.location.href = './index.html?auth=success';
    } else {
      // No token and no error — something unexpected
      window.location.href = './index.html?auth=error&reason=no_token';
    }
  })();
</script>
</body>
</html>
